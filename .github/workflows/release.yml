# .github/workflows/release.yml
# 密码管家 macOS + Windows 双端自动构建并发布至 GitHub Releases
#
# 触发条件：当推送 v* 格式的 Tag 时（如 v1.0.5），自动在云端编译双端客户端并创建 Release。
# 使用方法：在本地运行 `python scripts/release.py 1.0.5`，脚本会自动推送 Tag 触发此工作流。

name: Build & Release

on:
  push:
    tags:
      - 'v*'

# 赋予 workflow 创建 Release 和上传附件的写权限
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            asset_name: 密码管家_mac_dist.zip
          - os: windows-latest
            platform: win
            asset_name: 密码管家_win_dist.zip

    steps:
      # ========== 1. 拉取代码 ==========
      - name: Checkout code
        uses: actions/checkout@v4

      # ========== 2. 配置 Python 环境 ==========
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ========== 3. 安装项目依赖与 PyInstaller ==========
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ========== 4. 创建 .env 配置文件（打包时嵌入） ==========
      - name: Create .env for packaging
        shell: bash
        run: |
          cat > .env << 'EOF'
          MYSQL_HOST=${{ secrets.MYSQL_HOST || 'localhost' }}
          MYSQL_PORT=${{ secrets.MYSQL_PORT || '3306' }}
          MYSQL_USER=${{ secrets.MYSQL_USER || 'root' }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD || '' }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE || 'password_manager' }}
          LLM_PROVIDER=${{ secrets.LLM_PROVIDER || 'openai' }}
          LLM_MODEL=${{ secrets.LLM_MODEL || 'gpt-3.5-turbo' }}
          LLM_API_KEY=${{ secrets.LLM_API_KEY || '' }}
          LLM_BASE_URL=${{ secrets.LLM_BASE_URL || '' }}
          EOF

      # ============================================================
      #                   macOS 专属构建步骤
      # ============================================================

      # macOS: 转换 PNG 图标为 .icns 原生格式
      - name: "[macOS] Convert icon to .icns"
        if: matrix.platform == 'mac'
        run: |
          PNG_ICON="src/password_manager/gui/app_icon.png"
          ICNS_ICON="src/password_manager/gui/app_icon.icns"
          if [ -f "$PNG_ICON" ]; then
            ICON_DIR="src/password_manager/gui/app_icon.iconset"
            mkdir -p "$ICON_DIR"
            sips -z 16 16     "$PNG_ICON" --out "$ICON_DIR/icon_16x16.png"     > /dev/null 2>&1
            sips -z 32 32     "$PNG_ICON" --out "$ICON_DIR/icon_16x16@2x.png"  > /dev/null 2>&1
            sips -z 32 32     "$PNG_ICON" --out "$ICON_DIR/icon_32x32.png"     > /dev/null 2>&1
            sips -z 64 64     "$PNG_ICON" --out "$ICON_DIR/icon_32x32@2x.png"  > /dev/null 2>&1
            sips -z 128 128   "$PNG_ICON" --out "$ICON_DIR/icon_128x128.png"   > /dev/null 2>&1
            sips -z 256 256   "$PNG_ICON" --out "$ICON_DIR/icon_128x128@2x.png" > /dev/null 2>&1
            sips -z 256 256   "$PNG_ICON" --out "$ICON_DIR/icon_256x256.png"   > /dev/null 2>&1
            sips -z 512 512   "$PNG_ICON" --out "$ICON_DIR/icon_256x256@2x.png" > /dev/null 2>&1
            sips -z 512 512   "$PNG_ICON" --out "$ICON_DIR/icon_512x512.png"   > /dev/null 2>&1
            sips -z 1024 1024 "$PNG_ICON" --out "$ICON_DIR/icon_512x512@2x.png" > /dev/null 2>&1
            iconutil -c icns "$ICON_DIR" -o "$ICNS_ICON"
            rm -rf "$ICON_DIR"
            echo "✅ macOS .icns icon generated"
          fi

      # macOS: 使用 PyInstaller 打包 .app
      - name: "[macOS] Build .app with PyInstaller"
        if: matrix.platform == 'mac'
        run: |
          ICNS_ICON="src/password_manager/gui/app_icon.icns"
          ICON_ARG=""
          if [ -f "$ICNS_ICON" ]; then
            ICON_ARG="--icon=$ICNS_ICON"
          fi
          pyinstaller \
            --noconfirm \
            --windowed \
            --name="密码管家" \
            $ICON_ARG \
            --add-data="src/password_manager/gui/app_icon.png:password_manager/gui" \
            --add-data=".env:." \
            --paths="src" \
            run_gui.py

      # macOS: 修复 Info.plist 图标后缀并打包为 zip（保留 Unix 权限）
      - name: "[macOS] Package .app into zip"
        if: matrix.platform == 'mac'
        run: |
          APP_BUNDLE="dist/密码管家.app"
          if [ -d "$APP_BUNDLE" ]; then
            sed -i '' 's/app_icon.icns/app_icon/g' "$APP_BUNDLE/Contents/Info.plist" || true
            touch "$APP_BUNDLE"
            cd dist
            zip -ry "密码管家_mac_dist.zip" "密码管家.app" > /dev/null 2>&1
            cd ..
            echo "✅ macOS zip package created"
          else
            echo "❌ .app bundle not found!"
            exit 1
          fi

      # ============================================================
      #                   Windows 专属构建步骤
      # ============================================================

      # Windows: 使用 PyInstaller 打包 .exe（单文件模式）
      - name: "[Windows] Build .exe with PyInstaller"
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $iconArg = ""
          $icoIcon = "src/password_manager/gui/app_icon.ico"
          $pngIcon = "src/password_manager/gui/app_icon.png"

          # 如果有 .ico 则直接用，否则尝试用 Pillow 从 .png 转换
          if (Test-Path $icoIcon) {
            $iconArg = "--icon=$icoIcon"
          } elseif (Test-Path $pngIcon) {
            try {
              pip install Pillow --quiet
              python -c "from PIL import Image; img = Image.open('$pngIcon'); img.save('$icoIcon', format='ICO', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])"
              if (Test-Path $icoIcon) { $iconArg = "--icon=$icoIcon" }
            } catch {
              Write-Host "⚠️ Icon conversion failed, building without icon"
            }
          }

          $pyinstallerArgs = @(
            "--noconfirm",
            "--onefile",
            "--noconsole",
            "--name=密码管家",
            "--add-data=src/password_manager/gui/app_icon.png;password_manager/gui",
            "--add-data=.env;.",
            "--paths=src"
          )
          if ($iconArg -ne "") { $pyinstallerArgs += $iconArg }
          $pyinstallerArgs += "run_gui.py"

          pyinstaller @pyinstallerArgs

      # Windows: 将 exe 打包为 zip
      - name: "[Windows] Package .exe into zip"
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $exePath = "dist/密码管家.exe"
          if (Test-Path $exePath) {
            Compress-Archive -Path $exePath -DestinationPath "dist/密码管家_win_dist.zip" -Force
            Write-Host "✅ Windows zip package created"
          } else {
            Write-Host "❌ .exe not found!"
            exit 1
          }

      # ========== 5. 上传构建产物 ==========
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  # ============================================================
  #           创建 GitHub Release 并挂载双端安装包
  # ============================================================
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: 密码管家_mac_dist.zip
          path: artifacts/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: 密码管家_win_dist.zip
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## 🌿 密码管家 ${{ github.ref_name }}

            ### 📦 下载安装包
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | 🍎 macOS | `密码管家_mac_dist.zip` | 解压后将 `.app` 拖入应用程序文件夹 |
            | 🪟 Windows | `密码管家_win_dist.zip` | 解压后双击 `密码管家.exe` 即可运行 |

            ### ⚠️ macOS 首次运行注意
            如遇"已损坏"提示，请在终端执行：
            ```bash
            xattr -cr /path/to/密码管家.app
            ```

            ---
            > 🤖 此版本由 GitHub Actions 自动构建并发布。
          files: |
            artifacts/密码管家_mac_dist.zip
            artifacts/密码管家_win_dist.zip
          draft: false
          prerelease: false
